name: Test Project
on: workflow_dispatch

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install Node JS
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Run Tests
        run: npm test
  deploy:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install Node JS
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Deploy
        run: echo "Deploying..."