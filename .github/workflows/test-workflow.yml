name: Activity types test workflow
on:
  pull_request:
    types: [opened, edited]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Install Node JS
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run Tests
        run: npm run test
      - name: Build project
        run: npm run build
      - name: Deploy
        run: echo "Deploying..."
